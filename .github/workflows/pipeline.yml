name: Website CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  validate-website:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check HTML File Exists
        run: |
          if [ -f index.html ]
          then
            echo "HTML File Found"
          else
            echo "HTML File Missing"
            exit 1
          fi

      - name: Display Success Message
        run: echo "Website Validation Successful"

      - name: Show Repository Files
        run: ls -la
